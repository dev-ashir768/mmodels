<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mmodels | Global Modeling Agency</title>
    <link rel="icon" href="/assets/others/logo.png" type="image/png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body
    class="flex flex-col items-center justify-center min-h-screen selection:bg-[#C50A76] selection:text-white"
  >
    <div class="text-center px-4 w-full">
      <!-- Logo -->
      <div class="flex flex-col items-center mb-16 select-none">
        <img
          src="/assets/others/logo.png"
          alt="M Models and Talent Agency"
          class="w-full max-w-[280px] md:max-w-md object-contain drop-shadow-xl"
        />
      </div>

      <!-- Regions -->
      <div
        class="flex flex-wrap justify-center items-center gap-4 md:gap-6 font-bold text-sm md:text-lg tracking-widest uppercase mb-12"
      >
        <a
          href="home.html?lang=en"
          class="hover:text-[#C50A76] text-gray-900 transition-colors duration-300"
          >Toronto</a
        >
        <span class="link-divider hidden sm:inline">|</span>
        <a
          href="home.html?lang=en"
          class="hover:text-[#C50A76] text-gray-900 transition-colors duration-300"
          >Vancouver</a
        >
        <span class="link-divider hidden sm:inline">|</span>
        <a
          href="home.html?lang=en"
          class="hover:text-[#C50A76] text-gray-900 transition-colors duration-300"
          >Calgary</a
        >
        <span class="link-divider hidden sm:inline">|</span>
        <a
          href="home.html?lang=ja"
          class="hover:text-[#C50A76] text-gray-900 transition-colors duration-300"
          >Japan</a
        >
      </div>

      <!-- Description -->
      <p
        class="text-gray-500 font-light text-sm md:text-base max-w-3xl mx-auto leading-relaxed"
      >
        Canada's leading modeling and talent agency, specializing in scouting
        and developing talent in Toronto, Vancouver, Calgary, and Japan.
      </p>
    </div>
  </body>
</html>
