<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video | mmodels</title>
    <link rel="icon" href="/assets/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter", "sans-serif"], serif: ["Playfair Display", "serif"] }, colors: { primary: "#C50A76" } } } };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="antialiased overflow-x-hidden selection:bg-primary selection:text-white">
    <!-- Navbar -->
    <nav id="navbar" class="fixed w-full z-50 glass-nav transition-all duration-300">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-24">
          <div class="flex-shrink-0 flex items-center">
            <a href="index.html" class="block"><img src="/assets/logo.png" alt="M Models" class="h-10 md:h-12 w-auto object-contain" /></a>
          </div>
          <div class="hidden lg:flex items-center space-x-6 text-sm font-bold uppercase tracking-wider">
            <a href="home.html" class="menu-link text-gray-600">Home</a>
            <a href="news.html" class="menu-link text-gray-600">News</a>
            <a href="video.html" class="menu-link active text-primary">Video</a>
            <a href="models.html" class="menu-link text-gray-600">Models</a>
            <a href="clients.html" class="menu-link text-gray-600">Our Clients</a>
            <a href="become-a-model.html" class="menu-link text-gray-600">Become a Model</a>
            <a href="hire-a-model.html" class="menu-link text-gray-600">Hire a Model</a>
            <a href="faq.html" class="menu-link text-gray-600">FAQ's</a>
            <a href="contact.html" class="menu-link text-gray-600">Contact Us</a>
          </div>
          <div class="lg:hidden flex items-center">
            <button id="mobile-btn" class="text-gray-600 hover:text-primary"><i class="fas fa-bars text-2xl"></i></button>
          </div>
        </div>
      </div>
      <div id="mobile-menu" class="hidden lg:hidden bg-white border-t border-gray-100 shadow-xl pb-4"></div>
    </nav>

    <!-- Header -->
    <header class="pt-40 pb-16 bg-white border-b border-gray-200">
      <div class="text-center container mx-auto px-4">
        <h1 class="text-primary font-bold uppercase tracking-[0.2em] text-sm md:text-base mb-4">Motion</h1>
        <h2 class="font-serif text-4xl md:text-5xl font-bold text-gray-900 mb-6">Video Portfolio</h2>
        <div class="h-1 w-24 bg-primary mx-auto"></div>
      </div>
    </header>

    <!-- Main Content -->
    <section class="py-20 bg-gray-50 flex items-center justify-center min-h-[50vh]">
        <div class="max-w-5xl w-full mx-auto px-4 sm:px-6 lg:px-8">
            <div class="aspect-w-16 aspect-h-9 bg-gray-200 rounded-lg overflow-hidden flex items-center justify-center relative shadow-lg">
                <!-- Using a placeholder image to simulate a video player since standard video embedding is needed -->
                <img src="https://images.unsplash.com/photo-1549429712-421b14a240ff?auto=format&fit=crop&q=80&w=1200" alt="Video Thumbnail" class="absolute inset-0 w-full h-full object-cover opacity-70">
                <div class="absolute inset-0 bg-black/20"></div>
                <!-- Play Button -->
                <button class="relative z-10 w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-2xl hover:scale-110 hover:bg-primary transition-all group">
                    <i class="fas fa-play text-gray-900 group-hover:text-white ml-2 text-2xl"></i>
                </button>
            </div>
            
            <div class="text-center mt-8">
                <h3 class="font-serif text-3xl font-bold text-gray-900">Showreel 2026</h3>
                <p class="text-gray-500 mt-2 font-medium">A glimpse into our fashion week highlights and commercial campaigns.</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-white py-12 border-t border-gray-200">
      <div class="max-w-7xl mx-auto px-4 text-center">
        <a href="index.html" class="block mb-6"><img src="/assets/logo.png" alt="M Models" class="max-h-16 w-auto object-contain mx-auto"></a>
        <p class="text-gray-400 text-xs">© 2026 M Models Global. All rights reserved.</p>
      </div>
    </footer>
    <script src="main.js"></script>

</html>
