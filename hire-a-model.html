            <a href="models.html" class="menu-link text-gray-600">Models</a>
            <a href="clients.html" class="menu-link text-gray-600"

            >
            <a href="hire-a-model.html" class="menu-link active text-primary"
              >Hire a Model</a
            >

              >Contact Us</a

          <div class="lg:hidden flex items-center">

    <!-- Header -->
    <header class="pt-40 pb-16 bg-white border-b border-gray-200">
      <div class="text-center container mx-auto px-4">
        <h1
          class="text-primary font-bold uppercase tracking-[0.2em] text-sm md:text-base mb-4"
        >
          Booking
        </h1>
        <h2

        >
          Hire a Model

    <!-- Main Content -->
    <section class="py-16 bg-gray-50 flex items-center justify-center">
      <div class="max-w-3xl w-full mx-auto px-4 sm:px-6 lg:px-8">
        <form
          id="hire-model-form"
          data-parsley-validate
          class="space-y-8 bg-white p-8 md:p-12 border border-gray-100 rounded-2xl shadow-xl"
        >
          <!-- Casting Director Section -->
          <div>
            <label class="block font-bold text-gray-800 text-sm uppercase tracking-wider mb-4"
              >Casting Director <span class="text-primary">*</span></label
            >
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <input
                  type="text"
                  name="first_name"
                  required
                  class="w-full form-input px-4 py-3 rounded-lg border-gray-200 focus:border-primary focus:ring-primary text-sm transition-all"
                  placeholder="First Name"
                />
              </div>
              <div>
                <input
                  type="text"
                  name="last_name"
                  required
                  class="w-full form-input px-4 py-3 rounded-lg border-gray-200 focus:border-primary focus:ring-primary text-sm transition-all"
                  placeholder="Last Name"
                />
              </div>
            </div>
          </div>

          <!-- Contact Info Section -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block font-bold text-gray-800 text-sm uppercase tracking-wider mb-2"
                >Phone Number <span class="text-primary">*</span></label
              >
              <input
                type="tel"
                name="phone"
                required
                class="w-full form-input px-4 py-3 rounded-lg border-gray-200 focus:border-primary focus:ring-primary text-sm transition-all"
                placeholder="+1 (555) 000-0000"
              />
            </div>
            <div>
              <label class="block font-bold text-gray-800 text-sm uppercase tracking-wider mb-2"
                >Email <span class="text-primary">*</span></label
              >
              <input
                type="email"
                name="email"
                required
                class="w-full form-input px-4 py-3 rounded-lg border-gray-200 focus:border-primary focus:ring-primary text-sm transition-all"
                placeholder="director@example.com"
              />
            </div>
          </div>

          <!-- Age & Gender Section -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block font-bold text-gray-800 text-sm uppercase tracking-wider mb-2"
                >Age Range</label
              >
              <div class="flex items-center space-x-2">
                <input
                  type="number"
                  name="age_min"
                  min="0"
                  class="w-full form-input px-4 py-3 rounded-lg border-gray-200 focus:border-primary focus:ring-primary text-sm transition-all"
                  placeholder="Min"
                />
                <span class="text-gray-400">to</span>
                <input
                  type="number"
                  name="age_max"
                  min="0"
                  class="w-full form-input px-4 py-3 rounded-lg border-gray-200 focus:border-primary focus:ring-primary text-sm transition-all"
                  placeholder="Max"
                />
              </div>
            </div>
            <div>
              <label class="block font-bold text-gray-800 text-sm uppercase tracking-wider mb-2"
                >Gender</label
              >
              <select
                name="gender"
                class="w-full form-input px-4 py-3 rounded-lg border-gray-200 focus:border-primary focus:ring-primary text-sm transition-all bg-white"
              >
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="non-binary">Non-Binary</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>

          <!-- Physical Attributes Section -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
              <label class="block font-bold text-gray-800 text-sm uppercase tracking-wider mb-2"
                >Eyes</label
              >
              <select
                name="eyes"
                class="w-full form-input px-4 py-3 rounded-lg border-gray-200 focus:border-primary focus:ring-primary text-sm transition-all bg-white"
              >
                <option value="">Any</option>
                <option value="black">Black</option>
                <option value="blue">Blue</option>
                <option value="brown">Brown</option>
                <option value="green">Green</option>
                <option value="grey">Grey</option>
                <option value="hazel">Hazel</option>
              </select>
            </div>
            <div>
              <label class="block font-bold text-gray-800 text-sm uppercase tracking-wider mb-2"
                >Hair</label
              >
              <select
                name="hair"
                class="w-full form-input px-4 py-3 rounded-lg border-gray-200 focus:border-primary focus:ring-primary text-sm transition-all bg-white"
              >
                <option value="">Any</option>
                <option value="auburn">Auburn</option>
                <option value="black">Black</option>
                <option value="blonde">Blonde</option>
                <option value="brown">Brown</option>
                <option value="grey">Grey</option>
                <option value="red">Red</option>
              </select>
            </div>
            <div>
              <label class="block font-bold text-gray-800 text-sm uppercase tracking-wider mb-2"
                >Hair Length</label
              >
              <select
                name="hair_length"
                class="w-full form-input px-4 py-3 rounded-lg border-gray-200 focus:border-primary focus:ring-primary text-sm transition-all bg-white"
              >
                <option value="">Any</option>
                <option value="afro">Afro</option>
                <option value="bald">Bald</option>
                <option value="long">Long</option>
                <option value="medium">Medium</option>
                <option value="short">Short</option>
              </select>
            </div>
          </div>

          <!-- Project Type Section -->
          <div>
            <label class="block font-bold text-gray-800 text-sm uppercase tracking-wider mb-2"
              >Project Type <span class="text-primary">*</span></label
            >
            <select
              name="project_type"
              required
              class="w-full form-input px-4 py-3 rounded-lg border-gray-200 focus:border-primary focus:ring-primary text-sm transition-all bg-white"
            >
              <option value="">Select Type</option>
              <option value="commercial">Commercial</option>
              <option value="editorial">Editorial</option>
              <option value="runway">Runway</option>
              <option value="fitness">Fitness</option>

              <option value="parts">Parts</option>
              <option value="other">Other</option>
            </select>
          </div>

          <!-- Ethnic Appearance Section -->
          <div>
            <label class="block font-bold text-gray-800 text-sm uppercase tracking-wider mb-4"
              >Ethnic Appearance</label
            >
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-y-3 gap-x-4">
              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">
                <input type="checkbox" name="ethnicity[]" value="African" class="rounded border-gray-300 text-primary focus:ring-primary" />
                <span>African</span>
              </label>
              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">
                <input type="checkbox" name="ethnicity[]" value="Black/ African American" class="rounded border-gray-300 text-primary focus:ring-primary" />
                <span>Black/ African American</span>
              </label>
              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">
                <input type="checkbox" name="ethnicity[]" value="Caucasian" class="rounded border-gray-300 text-primary focus:ring-primary" />
                <span>Caucasian</span>
              </label>
              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">
                <input type="checkbox" name="ethnicity[]" value="Eastern European" class="rounded border-gray-300 text-primary focus:ring-primary" />
                <span>Eastern European</span>
              </label>
              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">
                <input type="checkbox" name="ethnicity[]" value="East Asian" class="rounded border-gray-300 text-primary focus:ring-primary" />
                <span>East Asian</span>
              </label>
              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">
                <input type="checkbox" name="ethnicity[]" value="Filipino" class="rounded border-gray-300 text-primary focus:ring-primary" />
                <span>Filipino</span>
              </label>
              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">
                <input type="checkbox" name="ethnicity[]" value="Hispanic" class="rounded border-gray-300 text-primary focus:ring-primary" />
                <span>Hispanic</span>
              </label>
              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">
                <input type="checkbox" name="ethnicity[]" value="Mediterranean" class="rounded border-gray-300 text-primary focus:ring-primary" />
                <span>Mediterranean</span>
              </label>
              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">
                <input type="checkbox" name="ethnicity[]" value="Middle Eastern" class="rounded border-gray-300 text-primary focus:ring-primary" />
                <span>Middle Eastern</span>
              </label>
              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">
                <input type="checkbox" name="ethnicity[]" value="Mixed Ethnicity" class="rounded border-gray-300 text-primary focus:ring-primary" />
                <span>Mixed Ethnicity</span>
              </label>
              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">
                <input type="checkbox" name="ethnicity[]" value="North African" class="rounded border-gray-300 text-primary focus:ring-primary" />
                <span>North African</span>
              </label>
              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">
                <input type="checkbox" name="ethnicity[]" value="Native American Indian" class="rounded border-gray-300 text-primary focus:ring-primary" />
                <span>Native American Indian</span>

              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">
                <input type="checkbox" name="ethnicity[]" value="Pacific Islander" class="rounded border-gray-300 text-primary focus:ring-primary" />

              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">
                <input type="checkbox" name="ethnicity[]" value="South East Asian" class="rounded border-gray-300 text-primary focus:ring-primary" />
                <span>South East Asian</span>
              </label>
              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">
                <input type="checkbox" name="ethnicity[]" value="South Asian" class="rounded border-gray-300 text-primary focus:ring-primary" />
                <span>South Asian</span>

              <label class="flex items-center space-x-3 text-sm text-gray-600 cursor-pointer hover:text-primary transition-colors">

          <!-- File Uploads Section -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4">
            <div class="space-y-2">
              <label class="block font-bold text-gray-800 text-sm uppercase tracking-wider mb-2">Casting Breakdown</label>
              <div class="relative group">
                <input type="file" name="casting_breakdown" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                <div class="flex items-center justify-center p-4 border-2 border-dashed border-gray-200 rounded-lg group-hover:border-primary transition-colors">
                  <span class="text-sm text-gray-500">Choose file or drag & drop</span>
                </div>
              </div>
              <p class="text-[10px] text-gray-400">Max file size: 10MB</p>
            </div>
            <div class="space-y-2">
              <label class="block font-bold text-gray-800 text-sm uppercase tracking-wider mb-2">Scripts/Storyboard</label>
              <div class="relative group">
                <input type="file" name="scripts_storyboard" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                <div class="flex items-center justify-center p-4 border-2 border-dashed border-gray-200 rounded-lg group-hover:border-primary transition-colors">
                  <span class="text-sm text-gray-500">Choose file or drag & drop</span>
                </div>
              </div>
              <p class="text-[10px] text-gray-400">Max file size: 10MB</p>
            </div>
          </div>

          <!-- Comment Section -->
          <div>
            <label class="block font-bold text-gray-800 text-sm uppercase tracking-wider mb-2"
              >Comment <i class="far fa-comment-dots ml-1 text-gray-400"></i></label
            >
            <textarea
              name="comment"
              class="w-full form-input px-4 py-3 rounded-lg border-gray-200 focus:border-primary focus:ring-primary text-sm h-32 transition-all"
              placeholder="Additional requirements or special notes..."
            ></textarea>
          </div>

          <!-- Submit Button -->
          <div class="pt-4">
            <button
              type="submit"
              class="w-full px-8 py-5 bg-primary text-white font-bold uppercase tracking-[0.2em] text-sm hover:bg-black transition-all rounded-xl shadow-lg hover:shadow-2xl transform hover:-translate-y-1 active:translate-y-0"
            >
              Submit Booking Request
            </button>
          </div>
        </form>
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-white py-12 border-t border-gray-200">
      <div class="max-w-7xl mx-auto px-4 text-center">
        <a href="index.html" class="block mb-6"
          ><img
            src="/assets/others/logo.png"
            alt="M Models"
            class="max-h-16 w-auto object-contain mx-auto"
        /></a>
        <p class="text-gray-400 text-xs">
          © 2026 M Models Global. All rights reserved.
        </p>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/assets/main.js"></script>
    <script>
      $(document).ready(function() {
        const $form = $('#hire-model-form');
        const $submitBtn = $form.find('button[type="submit"]');
        const originalBtnText = $submitBtn.html();

        $form.on('submit', function(e) {
          e.preventDefault();
          
          if (!$form.parsley().validate()) {
             return;
          }

          // Show loading state
          $submitBtn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin mr-2"></i> Processing...');
          
          // Simulate API call
          setTimeout(() => {
            Swal.fire({
              title: 'Request Received!',
              text: 'Thank you. Our casting team will contact you shortly.',
              icon: 'success',
              confirmButtonColor: '#C50A76',
              background: '#ffffff',
              customClass: {
                title: 'font-serif text-2xl',
                confirmButton: 'px-8 py-3 rounded-lg uppercase tracking-wider font-bold'
              }
            });
            
            $form[0].reset();
            $form.parsley().reset();
            $submitBtn.prop('disabled', false).html(originalBtnText);
          }, 1500);
        });

        // Add visual feedback for file inputs
        $('input[type="file"]').on('change', function() {
          const fileName = $(this).val().split('\\').pop();
          const $display = $(this).next().find('span');
          if (fileName) {
            $display.text(fileName).addClass('text-primary font-semibold');
          } else {
            $display.text('Choose file or drag & drop').removeClass('text-primary font-semibold');
          }
        });
      });
    </script>
  </body>
</html>
