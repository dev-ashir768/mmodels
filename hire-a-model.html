<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hire a Model | mmodels</title>
    <link rel="icon" href="/assets/others/logo.png" type="image/png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              serif: ["Playfair Display", "serif"],
            },
            colors: { primary: "#C50A76" },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/parsley.js/2.9.2/parsley.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body
    class="antialiased overflow-x-hidden selection:bg-primary selection:text-white"
  >
    <!-- Navbar -->
    <nav
      id="navbar"
      class="fixed w-full z-50 glass-nav transition-all duration-300"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-24">
          <div class="flex-shrink-0 flex items-center">
            <a href="index.html" class="block"
              ><img
                src="/assets/others/logo.png"
                alt="M Models"
                class="h-10 md:h-12 w-auto object-contain"
            /></a>
          </div>
          <div
            class="hidden lg:flex items-center space-x-6 text-sm font-bold uppercase tracking-wider"
          >
            <a href="home.html" class="menu-link text-gray-600">Home</a>
            <!-- <a href="news.html" class="menu-link text-gray-600">News</a> -->
            <a href="video.html" class="menu-link text-gray-600">Video</a>
            <a href="models.html" class="menu-link text-gray-600">Models</a>
            <a href="clients.html" class="menu-link text-gray-600"
              >Our Clients</a
            >
            <a href="become-a-model.html" class="menu-link text-gray-600"
              >Become a Model</a
            >
            <a href="hire-a-model.html" class="menu-link active text-primary"
              >Hire a Model</a
            >
            <a href="faq.html" class="menu-link text-gray-600">FAQ's</a>
            <a href="contact.html" class="menu-link text-gray-600"
              >Contact Us</a
            >
          </div>
          <div class="lg:hidden flex items-center">
            <button id="mobile-btn" class="text-gray-600 hover:text-primary">
              <i class="fas fa-bars text-2xl"></i>
            </button>
          </div>
        </div>
      </div>
      <div
        id="mobile-menu"
        class="hidden lg:hidden bg-white border-t border-gray-100 shadow-xl pb-4"
      ></div>
    </nav>

    <!-- Header -->
    <header class="pt-40 pb-16 bg-white border-b border-gray-200">
      <div class="text-center container mx-auto px-4">
        <h1
          class="text-primary font-bold uppercase tracking-[0.2em] text-sm md:text-base mb-4"
        >
          Booking
        </h1>
        <h2
          class="font-serif text-4xl md:text-5xl font-bold text-gray-900 mb-6"
        >
          Hire a Model
        </h2>
        <div class="h-1 w-24 bg-primary mx-auto"></div>
      </div>
    </header>

    <!-- Main Content -->
    <section class="py-16 bg-gray-50 flex items-center justify-center">
      <div class="max-w-3xl w-full mx-auto px-4 sm:px-6 lg:px-8">
        <form
          data-parsley-validate
          class="space-y-6 bg-white p-8 md:p-12 border border-gray-200 rounded-lg shadow-sm"
        >
          <div>
            <label class="block font-semibold text-gray-700 text-sm mb-2"
              >Company Name <span class="text-red-500">*</span></label
            >
            <input
              type="text"
              required
              class="w-full form-input px-4 py-3 rounded text-sm"
              placeholder="Your brand or company"
            />
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block font-semibold text-gray-700 text-sm mb-2"
                >Contact Name <span class="text-red-500">*</span></label
              >
              <input
                type="text"
                required
                class="w-full form-input px-4 py-3 rounded text-sm"
                placeholder="Full Name"
              />
            </div>
            <div>
              <label class="block font-semibold text-gray-700 text-sm mb-2"
                >E-mail <span class="text-red-500">*</span></label
              >
              <input
                type="email"
                required
                class="w-full form-input px-4 py-3 rounded text-sm"
                placeholder="contact@example.com"
              />
            </div>
          </div>

          <div>
            <label class="block font-semibold text-gray-700 text-sm mb-2"
              >Project Details <span class="text-red-500">*</span></label
            >
            <textarea
              required
              class="w-full form-input px-4 py-3 rounded text-sm h-32"
              placeholder="Please describe the campaign, intended dates, usage rights required, and specific model requirements..."
            ></textarea>
          </div>

          <button
            type="submit"
            class="w-full px-8 py-4 bg-primary text-white font-bold uppercase tracking-widest text-sm hover:bg-black transition-all rounded shadow-md"
          >
            Request Booking
          </button>
        </form>
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-white py-12 border-t border-gray-200">
      <div class="max-w-7xl mx-auto px-4 text-center">
        <a href="index.html" class="block mb-6"
          ><img
            src="/assets/others/logo.png"
            alt="M Models"
            class="max-h-16 w-auto object-contain mx-auto"
        /></a>
        <p class="text-gray-400 text-xs">
          © 2026 M Models Global. All rights reserved.
        </p>
      </div>
    </footer>
    <script src="/assets/main.js"></script>
  </body>
</html>
